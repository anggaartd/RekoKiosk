name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
          sudo apt-get clean

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
          unzip -q tools.zip
          mv cmdline-tools latest
          rm tools.zip
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: Accept Android licenses & install SDK
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "platforms;android-36" "build-tools;34.0.0" "build-tools;35.0.0" "build-tools;36.0.0" "platform-tools" "ndk;27.1.12297006" "cmake;3.22.1"

      - name: Install dependencies
        run: npm install

      - name: Apply patches
        run: npx patch-package

      - name: Create gradle.properties
        working-directory: android
        run: |
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" > gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties
          echo "org.gradle.parallel=false" >> gradle.properties
          echo "org.gradle.configureondemand=true" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: Generate codegen for native modules
        working-directory: android
        run: ./gradlew generateCodegenArtifactsFromSchema --no-daemon

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --max-workers=2

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RekoKiosk-release
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Get version & date
        id: version
        run: |
          VERSION=$(grep "versionName" android/app/build.gradle 2>/dev/null | head -1 | sed 's/.*"\(.*\)".*/\1/' || echo "1.0.0")
          DATE=$(date +'%Y%m%d-%H%M')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}-${DATE}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.version.outputs.date }}
          name: "RekoKiosk Build ${{ steps.version.outputs.date }}"
          body: |
            **Automated build** dari branch `main`
            
            Build date: ${{ steps.version.outputs.date }}
            
            ### Download
            Install ke tablet: `adb install -r RekoKiosk.apk`
            
            ### OTA Update
            Gunakan URL di bawah untuk OTA update via Admin Panel.
          files: android/app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
